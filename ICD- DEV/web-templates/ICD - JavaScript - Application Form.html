<script>
    //api call to update record
    function UpdateThisApplication(updateData)
    {
        return new Promise(function (resolve, reject) {
            webapi.safeAjax({
                type: "PATCH",
                contentType: "application/json",
                url: "/_api/icd_applications({{request.params.id}})",
                data: JSON.stringify(updateData), // updateData should be a JavaScript object with the fields you want to update
                success: function (data, textStatus, xhr) {
                    console.log("Record updated successfully");
                    resolve(true);  // Resolve the promise on success
                },
                error: function (xhr, textStatus, errorThrown) {
                    console.log("Error: " + xhr.responseText + ", " + textStatus + ", " + errorThrown);
                    reject(false);  // Reject the promise on error
                }
			});
		});
	}

    $(document).ready(function()

		{
			// Check if totalamount cell exists and value equals 0
			const totalAmountCell = $('td[data-attribute="totalamount"]');
			
			if (totalAmountCell.length > 0)
			{
				try {
				// Parse the data-value attribute to get the value
				const dataValueStr = totalAmountCell.attr('data-value');
				const dataValueObj = JSON.parse(dataValueStr);
				
				if (dataValueObj && dataValueObj.Value === 0) {
					// Hide the coupon code field (the entire table cell)
					$('td:has(#icd_couponcode)').hide();
					
					// Also remove payment method validation as per your previous code
					$("#icd_paymentmethod").removeAttr("aria-required");
					$("#RequiredFieldValidatoricd_paymentmethod").hide();
					$('td:has(#icd_paymentmethod)').hide();
					
					if (typeof Page_Validators !== 'undefined') {
					Page_Validators = Page_Validators.filter(function(validator) {
						return validator.controltovalidate !== "icd_paymentmethod";
					});
					}
				} else {
					console.log("Total amount is not zero");
				}
				} catch (e) {
				console.log("Error parsing totalamount value:", e);
				}
			} else {
				console.log("Found nothing");
			}
		}, 1000); // 1000ms = 1 second delay

    });

            field.closest(".control").prev().addClass("required");

            // Function to check the hidden field value and enable/disable the NextButton
            function checkFieldValue() {
                const value = field.val();

                // Check if the hidden field value is empty or not (without trimming spaces)
                if (value === '') {
                    $('#NextButton').prop('disabled', true); // Disable the button if empty
                } else {
                    $('#NextButton').prop('disabled', checkDocGrid()); // Enable the button if value is present
                }
            }

            // Initial check on page load
            checkFieldValue();            

            // Create a MutationObserver to detect changes to the value attribute of the hidden field
            const targetNode = document.getElementById('icd_areasofinterest');
            const config = { attributes: true, attributeFilter: ['value'] };

            const callback = function (mutationsList) {
                for (const mutation of mutationsList) {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'value') {
                        const value = mutation.target.value;

                        // Check if the hidden field value is empty or not (without trimming spaces)
                        if (value === '') {
                            $('#NextButton').prop('disabled', true); // Disable the button if empty
                        } else {
                            $('#NextButton').prop('disabled', checkDocGrid()); // Enable the button if value is present
                        }
                    }
                }
            };

            const observer = new MutationObserver(callback);
            observer.observe(targetNode, config);
        } else {
            console.log("Hidden field with id 'icd_areasofinterest' does not exist.");
        }		
    });

    // Function to format the phone number
    function formatPhoneNumber(inputField)
	{
        var phoneNumber = $(inputField).val().replace(/\D/g, ''); // Remove non-digit characters
        var formattedPhoneNumber = '';

        // Automatically format as XXX-XXX-XXXX
        if (phoneNumber.length >= 7) {
            formattedPhoneNumber = phoneNumber.substring(0, 3) + '-' + phoneNumber.substring(3, 6) + '-' + phoneNumber.substring(6, 10);
        } else if (phoneNumber.length >= 4) {
            formattedPhoneNumber = phoneNumber.substring(0, 3) + '-' + phoneNumber.substring(3, 6);
        } else {
            formattedPhoneNumber = phoneNumber;
        }

        $(inputField).val(formattedPhoneNumber); // Update the input field with the formatted number
    }

    // Function to validate phone number format
    function validatePhoneNumber(inputField)
	{
        var phoneNumber = $(inputField).val();
        var digitsOnly = phoneNumber.replace(/\D/g, '');

        var phoneRegex = /^\d{3}-\d{3}-\d{4}$/;

        return phoneRegex.test(phoneNumber) && digitsOnly.length === 10;
    }

    // Central validation check for all fields
    function validateAllPhoneFields()
	{
        var allValid = true;
        var anyFieldFilled = false;

        phoneFields.each(function ()
		{
            var value = $(this).val().trim();

            if (value !== '') {
                anyFieldFilled = true;

                if (!validatePhoneNumber(this)) {
                    showAlert('error', 'Invalid phone number or wrong format'); // Replace with your alert function
                    allValid = false;
                }
            }
        });

        if (!anyFieldFilled || !allValid)
		{
            $('#NextButton').prop('disabled', true);
        }
        else {
			
            $('#NextButton').prop('disabled', checkDocGrid());            
        }
    }

        phoneFields.on('input', function () {

        phoneFields.on('blur', function () {
            if (!validatePhoneNumber(this)) {
                showAlert('error', 'Invalid phone number'); // Replace with your alert function
                $('#NextButton').prop('disabled', true);
            } else {
                validateAllPhoneFields(); // Re-check all fields in case of multiple inputs
            }
        });

        // Validate on load
        validateAllPhoneFields();
    }

    function chkCoupon()
	{
        showLoadingModal("Please wait... validating your coupon");

        var chkCouponflow = "/_api/cloudflow/v1.0/trigger/bb981bef-a19a-ef11-8a69-6045bdcd6ad5";
        var data = {
            "discountcoupon": $("#icd_couponcode").val(),
            "applicationid": "{{ request.params.id }}"
        };
        console.log("chkCouponflow: data ",data);
        var payload = { eventData: JSON.stringify(data) };

        shell.ajaxSafePost({
            type: "POST",
            contentType: "application/json",
            url: chkCouponflow,
            data: JSON.stringify(payload),
            processData: false,
            global: false
        })
		.done(async function (data)
		{
			console.log("Success:", data);
			const parsedData = typeof data === 'string' ? JSON.parse(data) : data;

			if (parsedData.response === "yes") {
				// Define the update function and execute it immediately
				try {
					var updateData = { "icd_couponcode": $("#icd_couponcode").val() };
					let result = await UpdateThisApplication(updateData); // Wait for the AJAX call
					if (result) {

						showAlert('success', 'You are eligible for the discount');
						setTimeout(function () {
							hideLoadingModal();
							location.reload(true); // Reload the page after 2 seconds
						}, 2000);
					}
				} catch (error) {
					console.log("Update failed:", error);
					hideLoadingModal();
					showAlert('Error', 'Failed to apply discount', 'error');
				}
			} else {
				hideLoadingModal();
				showAlert('Error', 'Discount coupon not available', 'error');
			}
		})
		.fail(function (xhr, status, error)
		{
			console.log("Failed:", status, error);
			console.log("Response:", xhr.responseText);
			hideLoadingModal();
			showAlert('Error', 'Coupon validation failed', 'error');
		});
	}

	$('#override_BilltoicdOrganisationName').on('change', function ()
	{
		if ($(this).is(':checked')) {
			// If the checkbox is checked, hide icd_name and show companyInfoCompleteSearchBillTo
			// If the checkbox is unchecked, hide companyInfoCompleteSearchBillTo and show icd_name
			$('#companyInfoCompleteSearchBillTo').hide();
			$('#icd_billto').show();

		} else {
			$('#icd_billto').hide();
			$('#companyInfoCompleteSearchBillTo').show();
		}
	});

	// Trigger change event on page load to apply the initial state
	$('#override_BilltoicdOrganisationName').trigger('change');

	// Autopopulate account field  -------------------------------------------->
	$("#companyInfoCompleteSearchBillTo").autocomplete(
	{
		source: function (request, response) {
			if (request.term.length >= 3)
			{
				$.ajax(
				{
					url: "/_api/accounts?$select=icd_industrytype,name,accountid,address1_city,address1_country,address1_county,address1_stateorprovince,address1_line1,address1_line2,address1_line3,icd_grossrevenue,address1_postalcode,_icd_organizationsizebyrevenue_value,icd_monthofagm,icd_companytype",
					type: "GET",
					data: 
					{
						$filter: "contains(name,'" + request.term + "')",
						$top: 5
					},
					success: function (data)
					{
						var results = $.map(data.value, function (account) 
						{
							return {
								label: account.name,  // Displayed va lue in the suggestion list
								value: account.name,  // Value returned on selection
								accountData: account  // Store the entire account object for later use
							};
						});
						response(results);
					},
					error: function () {
						console.error("Error fetching accounts from API");
					}
				});
			}
		},
		minLength: 3,
		select: function (event, ui) {
			// Access the selected account's data
			var selectedAccount = ui.item.accountData;

			// Autopopulate fields with the selected account's data
			$("#icd_billtoacc").val(selectedAccount.accountid);
			$("#icd_billto").val(selectedAccount.name);
			$("#icd_billtocity").val(selectedAccount.address1_city);
			$("#icd_billtocountry").val(selectedAccount.address1_country);
			$("#icd_billtostateorprovince").val(selectedAccount.address1_stateorprovince);
			$("#icd_billtoline1").val(selectedAccount.address1_line1);
			$("#icd_billtoline2").val(selectedAccount.address1_line2);

			$("#icd_billtopostalcode").val(selectedAccount.address1_postalcode);
		}
	});
	
	var companyValue = $('#icd_billto').val();
	
	if (companyValue !== "") {
		$('#companyInfoCompleteSearchBillTo').val(companyValue); // Copy the value to the companyInfoCompleteSearch field
	};
	
	// Clear the #icd_billtoacc dropdown when #icd_name changes
	$('#icd_billto').on('change input', function () {
		$('#icd_billtoacc').val(''); // Clear the value of the dropdown
	});

	//End Autopopulate account field -------------------------------------------->
	//START code to grey our address field when using candapostApi Field------------------------->
	$('#override_icd_billtoline1').on('change', function ()
	{
		if ($(this).is(':checked')) {
			// Remove the inline background color CSS with !important if the checkbox is checked
			$('#icd_billtoline1, #icd_billtoline2, #icd_billtocity, #icd_billtostateorprovince, #icd_billtopostalcode,#icd_billtocanadastateorprovince, #icd_billtocountry').each(function () {
				$(this).css('background-color', ''); // Remove inline style
				$(this).attr('style', function (i, style) {
					return style ? style.replace(/background-color:.*?;/gi, '') : '';
				});
			});
			toggleProvinceInputBillto();
		} else {
			// Add the inline background  color CSS with !important if the checkbox is unchecked
			$('#icd_billtoline1, #icd_billtoline2, #icd_billtocity, #icd_billtostateorprovince, #icd_billtopostalcode,#icd_billtocanadastateorprovince, #icd_billtocountry').each(function () {
				$(this).attr('style', function (i, style) {
					return (style || '') + 'background-color: #f2f2f2 !important;';
				});
			});
			toggleProvinceInputBillto();
		}
	});

	// Trigger change event on page load to apply the initial state
	$('#override_icd_billtoline1').trigger('change');

	// Move #icd_billtocanadastateorprovince into the same <td> as #icd_billtostateorprovince
	$('#icd_billtostateorprovince').closest('td').append($('#icd_billtocanadastateorprovince'));

	// Hide the Canadian province input initially
	$('#icd_billtocanadastateorprovince').hide();

	function toggleProvinceInputBillto()
	{
		/* $('#icd_billtocanadastateorprovince_label').closest('tr').hide();
		 var countryValue = $('#icd_billtocountry').val();
		 if (countryValue === 'Canada' && $('#override_icd_billtoline1').is(':checked')) {
			 // Show the Canadian province input and hide the other one
			 $('#icd_billtostateorprovince').hide();
			 $('#icd_billtocanadastateorprovince').show();
		 } else {
			 // Show the default state/province input and hide the Canadian province one
			 //$('#icd_billtostateorprovince').val('');
			 $('#icd_billtostateorprovince').show();
			 $('#icd_billtocanadastateorprovince').hide();
		 }*/
	}

	// Trigger toggle on page load 
	toggleProvinceInputBillto();

	// Listen for changes to the country field
	$('#icd_billtocountry').on('change', function ()
	{
		toggleProvinceInputBillto();
	});

	$('#icd_billtocanadastateorprovince').on('change', function ()
	{
		// Clear the icd_stateorprovince field
		$('#icd_billtostateorprovince').val('');

		// Get the selected option's text
		var selectedText = $(this).find('option:selected').text();

		// Copy the selected text to the icd_stateorprovince field
		$('#icd_billtostateorprovince').val(selectedText);
	});
	//END code to grey our address  field when using candapostApi Field------------------------->

	//Payment Method 
	if ($("#icd_paymentmethod").length)
	{
		let allowedOptions = [];

		// Get all the values from paymentMethod in Django template and store them in an array
		{% for option in paymentMethod %}
			allowedOptions.push("{{ option.value }}");
		{% endfor %}

		$("#icd_paymentmethod option").each(function () {
			let optionValue = $(this).val();

			// Keep the "Select" option, remove any option not in the allowed list
			if (optionValue !== "" && !allowedOptions.includes(optionValue)) {
				$(this).remove();
			}
		});
	}
	
</script>
