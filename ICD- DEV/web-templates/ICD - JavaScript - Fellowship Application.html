    $(window).on('load', function () {
        const prefixes = ['icd_reference1', 'icd_reference2', 'icd_reference3', 'icd_nominee'];

        // START code to grey out address fields when using candapostApi Field ------------------------->
        prefixes.forEach(prefix => {
            $(`#override_${prefix}line1`).on('change', function () {
                if ($(this).is(':checked')) {
                    // Remove the inline background color CSS with !important if the checkbox is checked
                    $(`#${prefix}line1, #${prefix}line2, #${prefix}city, #${prefix}stateorprovince, #${prefix}postalcode, #${prefix}canadastateorprovince, #${prefix}country`).each(function () {
                        $(this).css('background-color', ''); // Remove inline style
                        $(this).attr('style', function (i, style) {
                            return style ? style.replace(/background-color:.*?;/gi, '') : '';
                        });
                    });
                    toggleProvinceInput(prefix);
                } else {
                    // Add the inline background color CSS with !important if the checkbox is unchecked
                    $(`#${prefix}line1, #${prefix}line2, #${prefix}city, #${prefix}stateorprovince, #${prefix}postalcode, #${prefix}canadastateorprovince, #${prefix}country`).each(function () {
                        $(this).attr('style', function (i, style) {
                            return (style || '') + 'background-color: #f2f2f2 !important;';
                        });
                    });
                    toggleProvinceInput(prefix);
                }
            });

            // Trigger change events on page load to apply the initial state
            $(`#override_${prefix}line1`).trigger('change');

            // Move #{prefix}canadastateorprovince into the same <td> as #{prefix}stateorprovince
            $(`#${prefix}stateorprovince`).closest('td').append($(`#${prefix}canadastateorprovince`));

            // Hide the Canadian province input initially
            $(`#${prefix}canadastateorprovince`).hide();
        });

        function toggleProvinceInput(prefix) {
            $(`#${prefix}canadastateorprovince_label`).closest('tr').hide();
            var countryValue = $(`#${prefix}country`).val();
            if (countryValue === 'Canada' && $(`#override_${prefix}line1`).is(':checked')) {
                // Show the Canadian province input and hide the other one
                $(`#${prefix}stateorprovince`).hide();
                $(`#${prefix}canadastateorprovince`).show();
            } else {
                // Show the default state/province input and hide the Canadian province one
                $(`#${prefix}stateorprovince`).show();
                $(`#${prefix}canadastateorprovince`).hide();
            }
        }

        // Trigger toggle on page load for all prefixes
        prefixes.forEach(prefix => toggleProvinceInput(prefix));

        // Listen for changes to the country fields
        prefixes.forEach(prefix => {
            $(`#${prefix}country`).on('change', function () {
                toggleProvinceInput(prefix);
            });
        });

        // Listen for changes to the Canadian province fields
        prefixes.forEach(prefix => {
            $(`#${prefix}canadastateorprovince`).on('change', function () {
                // Clear the default state/province field
                $(`#${prefix}stateorprovince`).val('');

                // Get the selected option's text
                var selectedText = $(this).find('option:selected').text();

                // Copy the selected text to the default state/province field
                $(`#${prefix}stateorprovince`).val(selectedText);
            });
        });
        // END code to grey out address fields when using candapostApi Field ------------------------->
        $('.add-folder.btn.btn-info.action').hide();

        //document upload 
        if ($("#DocumentUpload").length > 0) {
            $("#NextButton").prop("disabled", true);
        }

        var targetNode = document.getElementById("DocumentUpload");

        if (targetNode) {

            var observer = new MutationObserver(function (mutationsList) {
                mutationsList.forEach(function (mutation) {
                    if (mutation.type === "childList" || mutation.type === "attributes") {
                        handleDocumentUploadChange();
                    }
                });
            });

            observer.observe(targetNode, { attributes: true, childList: true, subtree: true });
        }

        // Function to count number of <tr> inside #DocumentUpload
        function handleDocumentUploadChange() {
            var rowCount = $("#DocumentUpload tr").length;
                if(rowCount>1){
                    $("#NextButton").prop("disabled", false);
                }
                else{
                    $("#NextButton").prop("disabled", true);
                }
        }

        //BoardExperience and ProfessionalExperience
        if ($("#BoardExperience").length > 0 || $("#ProfessionalExperience").length > 0) {
            $("#NextButton").prop("disabled", true);
        }

        var boardExptargetNode = document.getElementById("BoardExperience");
        var proExptargetNode = document.getElementById("ProfessionalExperience");

        if (boardExptargetNode) {

            var observer = new MutationObserver(function (mutationsList) {
                mutationsList.forEach(function (mutation) {
                    if (mutation.type === "childList" || mutation.type === "attributes") {
                        handleboardExpAndProExp();
                    }
                });
            });

            observer.observe(boardExptargetNode, { attributes: true, childList: true, subtree: true });
        }
        if (proExptargetNode) {

            var observer = new MutationObserver(function (mutationsList) {
                mutationsList.forEach(function (mutation) {
                    if (mutation.type === "childList" || mutation.type === "attributes") {
                        console.log("Change detected in #DocumentUpload");
                        handleboardExpAndProExp();
                    }
                });
            });

            observer.observe(proExptargetNode, { attributes: true, childList: true, subtree: true });
            }

        // Function to count number of <tr> inside #DocumentUpload
        function handleboardExpAndProExp() {
            var boardExpRowCount = $("#BoardExperience tr").length;
            var proExpRowCount = $("#ProfessionalExperience tr").length;

                if(boardExpRowCount>1 && proExpRowCount>1){
                    $("#NextButton").prop("disabled", false);
                }
                else{
                    $("#NextButton").prop("disabled", true);
                }
        }

        // Store the HTML content in a variable
        var nomineeQualificationHTML = `{{ snippets["Application/FellowshipAward/NomimeeQualification"] }}`;

        // Replace the content of #icd_leadershipandstewardship with the saved content
        $('#icd_leadershipandstewardship_label').append(nomineeQualificationHTML);
        
    });
